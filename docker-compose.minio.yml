version: "3.8"

# MinIO local S3 — for certPortal integration tests
#
# Start:   docker compose -f docker-compose.minio.yml up -d
# Console: http://localhost:9001  (user: minioadmin / minioadmin)
# S3 API:  http://localhost:9000
#
# After starting, run once to create buckets + upload fixtures:
#   python testing/integration/setup_minio.py
#
# Update .env to switch from OVHcloud to MinIO (see .env.minio.example):
#   OVH_S3_ENDPOINT=http://localhost:9000
#   OVH_S3_KEY=minioadmin
#   OVH_S3_SECRET=minioadmin

services:
  minio:
    image: minio/minio:latest
    container_name: certportal_minio
    ports:
      - "9000:9000"   # S3 API — used by portals and tests
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio_data:
    driver: local
