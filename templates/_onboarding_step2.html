<!-- Step 2: Company + Contact (Gate B) -->
<div class="onboarding-step" id="onboarding-step-2">
  <h2 class="step-title">Step 2: Company &amp; Contact Information</h2>
  <p class="step-prompt">
    Provide your company name and a primary contact for {{ retailer_slug | title }}.
    This is who they'll reach out to if there's a question.
  </p>

  <form method="post" action="/onboarding/step2" class="step-form">
    <div class="form-group">
      <label class="form-label" for="company_name">Company Name</label>
      <input type="text" id="company_name" name="company_name" class="form-input"
             value="{{ profile.company_name or '' }}" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="contact_name">Contact Name</label>
      <input type="text" id="contact_name" name="contact_name" class="form-input"
             value="{{ profile.contact_name or '' }}" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="contact_email">Contact Email</label>
      <input type="email" id="contact_email" name="contact_email" class="form-input"
             value="{{ profile.contact_email or '' }}" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="contact_phone">Contact Phone</label>
      <input type="tel" id="contact_phone" name="contact_phone" class="form-input"
             value="{{ profile.contact_phone or '' }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Save &amp; Continue</button>
  </form>
</div>
