name: EDI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Schema validation gate (no DB needed — pure YAML)
  # Runs validate_all.py --ci; fails the build on any schema error.
  # ──────────────────────────────────────────────────────────────────────────
  schema-validation:
    name: "Schema Validation (validate_all --ci)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run validate_all --ci
        run: python schema_validators/validate_all.py --framework-path ./edi_framework --ci

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Unit tests + coverage (no DB — mocked psycopg2)
  # Enforces ≥85% coverage on lifecycle_engine/ per TRD §12.
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Unit Tests + Coverage (lifecycle_engine ≥85%)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pyedi_core (editable)
        run: pip install -e pyedi_core/

      - name: Run unit tests with coverage
        run: |
          python -m pytest \
            lifecycle_engine/tests/ \
            schema_validators/tests/ \
            --cov=lifecycle_engine \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Integration tests (Suites A–F) — requires live Postgres
  #
  # Suites A–E: auth, agents, gates, workspace, HITL (no live S3/OpenAI).
  #   OVH/OpenAI env vars are set to safe fake values because every suite
  #   that touches S3 or LLM calls mocks those interactions internally.
  #
  # Suite F: full lifecycle engine E2E against the Postgres service container.
  #   Runs migrations 001 (lifecycle tables) + 002 (portal_users) first.
  # ──────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Integration Tests (Suites A–F — live Postgres)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: certportal
          POSTGRES_PASSWORD: certportal
          POSTGRES_DB: certportal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Live DB for Suite F + Suite A auth DB path
      CERTPORTAL_DB_URL: postgresql://certportal:certportal@localhost:5432/certportal
      LIFECYCLE_PROFILE: development

      # JWT secret — any non-empty string works in CI (HS256 self-signed)
      CERTPORTAL_JWT_SECRET: ci-test-jwt-secret-not-for-production

      # OVH S3 — fake values; Suites B-E mock all S3 calls internally
      OVH_S3_ENDPOINT: https://fake.s3.ci
      OVH_S3_KEY: fake-key-ci
      OVH_S3_SECRET: fake-secret-ci
      OVH_S3_REGION: fake-region-ci

      # OpenAI — fake key; no suite makes live LLM calls
      OPENAI_API_KEY: sk-fake-openai-key-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pyedi_core (editable)
        run: pip install -e pyedi_core/

      - name: Run migration 001 — lifecycle tables
        run: |
          python -c "
          import os, psycopg2
          dsn = os.environ['CERTPORTAL_DB_URL']
          conn = psycopg2.connect(dsn)
          conn.autocommit = False
          with open('lifecycle_engine/migrations/001_lifecycle_tables.sql') as f:
              conn.cursor().execute(f.read())
          conn.commit()
          print('Migration 001 applied')
          "

      - name: Run migration 002 — portal_users table
        run: |
          python -c "
          import os, psycopg2
          dsn = os.environ['CERTPORTAL_DB_URL']
          conn = psycopg2.connect(dsn)
          conn.autocommit = False
          with open('migrations/002_users_table.sql') as f:
              conn.cursor().execute(f.read())
          conn.commit()
          print('Migration 002 applied')
          "

      - name: Run migrated unit tests (Suites A–I → pytest)
        run: |
          python -m pytest testing/unit/ -v \
            --junitxml=test-results/unit-suites.xml \
            --html=test-results/unit-suites.html --self-contained-html

      - name: Upload unit suite results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-suite-results
          path: test-results/

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Integration scenario tests (16 scenarios, 138 tests)
  #
  # Requires: Postgres + MinIO + all 3 portals running.
  # Runs P0 scenarios in CI mode (HITL gates auto-skipped).
  # ──────────────────────────────────────────────────────────────────────────
  integration-scenarios:
    name: "Integration Scenarios (P0 — 138 tests)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: certportal
          POSTGRES_PASSWORD: certportal
          POSTGRES_DB: certportal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: quay.io/minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "mc ready local || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CERTPORTAL_DB_URL: postgresql://certportal:certportal@localhost:5432/certportal
      CERTPORTAL_JWT_SECRET: ci-test-jwt-secret-not-for-production
      CERTPORTAL_CI: "true"
      LIFECYCLE_PROFILE: development

      # MinIO as local S3
      OVH_S3_ENDPOINT: http://localhost:9000
      OVH_S3_KEY: minioadmin
      OVH_S3_SECRET: minioadmin
      OVH_S3_REGION: us-east-1

      # Fake OpenAI — no live LLM calls in CI
      OPENAI_API_KEY: sk-fake-openai-key-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pyedi_core (editable)
        run: pip install -e pyedi_core/

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Apply all database migrations
        run: |
          for sql in \
            lifecycle_engine/migrations/001_lifecycle_tables.sql \
            migrations/001_app_tables.sql \
            migrations/002_users_table.sql \
            migrations/003_patch_reject.sql \
            migrations/004_revoked_tokens.sql \
            migrations/005_password_reset.sql; do
            psql $CERTPORTAL_DB_URL -f "$sql"
          done

      - name: Create S3 buckets and upload EDI fixtures
        run: python testing/integration/setup_minio.py

      - name: Start portals
        run: |
          uvicorn portals.pam:app --port 8000 &
          uvicorn portals.meredith:app --port 8001 &
          uvicorn portals.chrissy:app --port 8002 &
          sleep 5
          # Verify all 3 portals are alive
          curl -sf http://localhost:8000/health
          curl -sf http://localhost:8001/health
          curl -sf http://localhost:8002/health

      - name: Run P0 integration scenarios (CI mode)
        run: |
          python -m pytest testing/integration/ -v \
            -m "p0 and not hitl" \
            --junitxml=test-results/integration.xml \
            --html=test-results/integration.html --self-contained-html

      - name: Upload integration results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: test-results/
