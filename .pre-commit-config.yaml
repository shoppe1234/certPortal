# .pre-commit-config.yaml — certPortal architectural invariant enforcement.
#
# Hooks enforce:
#   INV-01: Agents must never import each other (S3 is the only inter-agent channel).
#   INV-07: Portals must never import from agents/ (portals read S3 signals only).
#
# Install: pre-commit install
# Manual:  pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-no-eval
      - id: text-double-quote-string-fixer

  - repo: local
    hooks:
      - id: inv-01-no-agent-cross-import
        name: "INV-01: Agents must not import each other"
        language: pygrep
        entry: "from agents\\.|import agents\\."
        files: "^agents/"
        types: [python]

      - id: inv-07-portals-no-agent-import
        name: "INV-07: Portals must not import from agents/"
        language: pygrep
        entry: "from agents\\.|import agents\\."
        files: "^portals/"
        types: [python]
